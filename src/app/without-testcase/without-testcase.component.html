<!-- without-testcase.component.html -->

<div class="register-container">

  <h2>Simple Register Form</h2>

  <form>

    <!-- Name Field -->
    <div class="form-group">
      <label>Name</label>

      <input
        type="text"
        placeholder="Enter Name"
        class="form-control"
      />
    </div>

    <!-- Email Field -->
    <div class="form-group">
      <label>Email</label>

      <input
        type="email"
        placeholder="Enter Email"
        class="form-control"
      />
    </div>

    <!-- Submit Button -->
    <button type="submit" class="submit-btn">
      Register
    </button>

  </form>

</div>
